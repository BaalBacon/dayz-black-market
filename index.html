<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Market Order System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e0f;
      --bg-secondary: #131a1c;
      --bg-tertiary: #1a2426;
      --accent-green: #3aff7a;
      --accent-red: #ff3a3a;
      --accent-yellow: #ffd93a;
      --text-primary: #e8f0f2;
      --text-secondary: #8b9ea3;
      --text-muted: #4a5b60;
      --border: #2a3a3d;
      --glow: rgba(58, 255, 122, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Titillium Web', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(58, 255, 122, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 58, 58, 0.03) 0%, transparent 50%);
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 2px solid var(--border);
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, 
        transparent 0%, 
        var(--accent-green) 50%, 
        transparent 100%);
      animation: scanline 3s linear infinite;
    }

    @keyframes scanline {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }

    .tab {
      padding: 1rem 2rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: 'Titillium Web', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
    }

    .tab:hover {
      color: var(--text-primary);
    }

    .tab.active {
      color: var(--accent-green);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--glow);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 2rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent-green);
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .category-toggles {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--bg-tertiary);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.3s ease;
      user-select: none;
    }

    .checkbox-wrapper:hover:not(.disabled) {
      border-color: var(--accent-green);
    }

    .checkbox-wrapper.active {
      border-color: var(--accent-green);
      background: rgba(58, 255, 122, 0.1);
    }

    .checkbox-wrapper.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: var(--text-muted);
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--accent-green);
    }

    .checkbox-wrapper.disabled input[type="checkbox"] {
      cursor: not-allowed;
    }

    .checkbox-wrapper label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .checkbox-wrapper.disabled label {
      cursor: not-allowed;
    }

    .locked-message {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .items-container {
      display: grid;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .item-row {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      padding: 1rem;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 100px 80px;
      gap: 1rem;
      align-items: center;
      transition: all 0.3s ease;
    }

    .item-row.sell-item {
      grid-template-columns: 2fr 1fr 100px 80px;
    }

    .item-row:hover {
      border-color: var(--accent-green);
      background: rgba(58, 255, 122, 0.05);
    }

    .item-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .price-label {
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .price-value {
      font-family: 'Courier Prime', monospace;
      font-weight: 700;
      color: var(--accent-green);
    }

    input[type="number"] {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 1rem;
      width: 100%;
      transition: all 0.3s ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 2px var(--glow);
    }

    input[type="text"],
    textarea,
    select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.75rem;
      font-family: 'Titillium Web', sans-serif;
      font-size: 1rem;
      width: 100%;
      transition: all 0.3s ease;
    }

    select {
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Courier Prime', monospace;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 2px var(--glow);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    .btn {
      background: var(--accent-green);
      color: var(--bg-primary);
      border: none;
      padding: 1rem 2rem;
      font-family: 'Titillium Web', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn:hover {
      box-shadow: 0 0 20px var(--glow);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-green);
      color: var(--accent-green);
    }

    .btn-secondary:hover {
      background: rgba(58, 255, 122, 0.1);
    }

    .order-summary {
      background: var(--bg-tertiary);
      border: 2px solid var(--accent-green);
      padding: 2rem;
      margin-top: 2rem;
      box-shadow: 0 0 30px var(--glow);
    }

    .order-id {
      font-family: 'Courier Prime', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-green);
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    .order-breakdown {
      margin-top: 1rem;
    }

    .breakdown-category {
      margin-bottom: 1.5rem;
    }

    .breakdown-category-title {
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-yellow);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      background: var(--bg-secondary);
      border-left: 2px solid var(--border);
      margin-bottom: 0.25rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.9rem;
    }

    .breakdown-totals {
      border-top: 2px solid var(--accent-green);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .breakdown-total {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem;
      font-family: 'Courier Prime', monospace;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .total-vendor {
      color: var(--accent-yellow);
    }

    .total-buy {
      color: var(--accent-green);
    }

    .total-sell {
      color: var(--accent-green);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-family: 'Courier Prime', monospace;
    }

    .error {
      background: rgba(255, 58, 58, 0.1);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      padding: 1rem;
      margin-bottom: 1rem;
      font-family: 'Courier Prime', monospace;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-family: 'Courier Prime', monospace;
    }

    @media (max-width: 768px) {
      .item-row {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }

      .item-row.sell-item {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-direction: column;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="THS_splash.png" alt="Black Market" style="max-width: 100%; height: auto; display: block; margin: 0 auto;">
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="buy">Create Buy Order</button>
      <button class="tab" data-tab="sell">Create Sell Order</button>
      <button class="tab" data-tab="lookup">Lookup Order</button>
    </div>

    <!-- CREATE SELL ORDER TAB -->
    <div class="tab-content" id="sell-tab">
      <div class="section">
        <div class="section-title">Select Categories</div>
        <div class="category-toggles">
          <div class="checkbox-wrapper" id="weapons-toggle">
            <input type="checkbox" id="weapons-check">
            <label for="weapons-check">Black Market Weapons</label>
          </div>
          <div class="checkbox-wrapper disabled" id="drugs-toggle">
            <div>
              <input type="checkbox" id="drugs-check" disabled>
              <label for="drugs-check">Drugs</label>
              <div class="locked-message">Not currently taking Drug Trader orders</div>
            </div>
          </div>
          <div class="checkbox-wrapper disabled" id="collectibles-toggle">
            <div>
              <input type="checkbox" id="collectibles-check" disabled>
              <label for="collectibles-check">Collectibles</label>
              <div class="locked-message">Not currently taking Collectible Trader orders</div>
            </div>
          </div>
        </div>
      </div>

      <div id="weapons-section" class="section" style="display: none;">
        <div class="section-title">Black Market Weapons</div>
        <div class="items-container" id="weapons-items"></div>
      </div>

      <div id="drugs-section" class="section" style="display: none;">
        <div class="section-title">Drugs</div>
        <div class="items-container" id="drugs-items"></div>
      </div>

      <div id="collectibles-section" class="section" style="display: none;">
        <div class="section-title">Collectibles</div>
        <div class="items-container" id="collectibles-items"></div>
      </div>

      <div class="section">
        <div class="section-title">Seller Information (Required)</div>
        <div class="form-group">
          <label>In-Game Name (IGN) *</label>
          <input type="text" id="sell-ign" placeholder="e.g., Survivor_Jake" required>
        </div>
        <div class="form-group">
          <label>Server *</label>
          <select id="sell-server" required>
            <option value="">-- Select Server --</option>
            <option value="Cherno1">Cherno1</option>
            <option value="Cherno2">Cherno2</option>
            <option value="Extreme">Extreme</option>
            <option value="Deer1">Deer1</option>
            <option value="Deer2">Deer2</option>
            <option value="Bitterroot">Bitterroot</option>
          </select>
        </div>
        <div class="form-group">
          <label>Additional Notes (Optional)</label>
          <textarea id="sell-notes" placeholder="e.g., Available 6-10pm EST, Discord: YourName#1234"></textarea>
        </div>
      </div>

      <button class="btn" onclick="submitSellOrder()">Submit Sell Order</button>

      <div id="sell-order-result"></div>
    </div>

    <!-- CREATE BUY ORDER TAB -->
    <div class="tab-content active" id="buy-tab">
      <div class="section">
        <div class="section-title">Available Items</div>
        <div class="items-container" id="sell-items"></div>
      </div>

      <div class="section">
        <div class="section-title">Buyer Information (Required)</div>
        <div class="form-group">
          <label>In-Game Name (IGN) *</label>
          <input type="text" id="buy-ign" placeholder="e.g., Survivor_Jake" required>
        </div>
        <div class="form-group">
          <label>Server *</label>
          <select id="buy-server" required>
            <option value="">-- Select Server --</option>
            <option value="Cherno1">Cherno1</option>
            <option value="Cherno2">Cherno2</option>
            <option value="Extreme">Extreme</option>
            <option value="Deer1">Deer1</option>
            <option value="Deer2">Deer2</option>
            <option value="Bitterroot">Bitterroot</option>
          </select>
        </div>
        <div class="form-group">
          <label>Additional Notes (Optional)</label>
          <textarea id="buy-notes" placeholder="e.g., Available 6-10pm EST, Discord: YourName#1234"></textarea>
        </div>
      </div>

      <button class="btn" onclick="submitBuyOrder()">Submit Buy Order</button>

      <div id="buy-order-result"></div>
    </div>

    <!-- LOOKUP ORDER TAB -->
    <div class="tab-content" id="lookup-tab">
      <div class="section">
        <div class="section-title">Lookup Order</div>
        <div class="form-group">
          <label>Order ID</label>
          <input type="text" id="lookup-order-id" placeholder="e.g., 20250414-001">
        </div>
        <button class="btn" onclick="lookupOrder()">Find Order</button>
      </div>

      <div id="lookup-result"></div>
    </div>
  </div>

  <script>
    // Configuration - UPDATE THIS WITH YOUR DEPLOYED WEB APP URL
    const API_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';
    
    // Lookup password
    const LOOKUP_PASSWORD = 'Because3y3GotHigh*';
    
    let buyInventory = null;
    let sellInventory = null;
    let lookupAuthenticated = false;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // Check if trying to access lookup tab
        if (tab.dataset.tab === 'lookup' && !lookupAuthenticated) {
          promptForPassword();
          return;
        }
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      });
    });
    
    function promptForPassword() {
      const password = prompt('Enter password to access Order Lookup:');
      
      if (password === LOOKUP_PASSWORD) {
        lookupAuthenticated = true;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        document.querySelector('[data-tab="lookup"]').classList.add('active');
        document.getElementById('lookup-tab').classList.add('active');
      } else if (password !== null) {
        alert('Incorrect password. Access denied.');
      }
    }

    // Category toggle handlers for sell orders (players selling TO you)
    function setupSellCategoryToggles() {
      const checkbox = document.getElementById('weapons-check');
      const wrapper = document.getElementById('weapons-toggle');
      const section = document.getElementById('weapons-section');
      
      checkbox.addEventListener('change', () => {
        if (checkbox.checked) {
          wrapper.classList.add('active');
          section.style.display = 'block';
          renderSellCategoryItems('weapons');
        } else {
          wrapper.classList.remove('active');
          section.style.display = 'none';
        }
      });
    }

    // Load inventories on page load
    async function loadInventories() {
      try {
        // Load sell inventory (what players are selling TO you - weapons/drugs/collectibles)
        const sellResponse = await fetch(`${API_URL}?action=getInventory`);
        buyInventory = await sellResponse.json(); // This goes to the SELL order tab
        
        // Load buy inventory (what players are buying FROM you - AS50/PKP + TF)
        const buyResponse = await fetch(`${API_URL}?action=getSellInventory`);
        const buyData = await buyResponse.json();
        sellInventory = buyData.items; // This goes to the BUY order tab
        
        setupSellCategoryToggles();
        renderBuyItems();
      } catch (error) {
        console.error('Error loading inventory:', error);
        showError('Failed to load inventory. Check your API_URL configuration.', 'sell-order-result');
      }
    }

    function renderSellCategoryItems(category) {
      const container = document.getElementById(`${category}-items`);
      container.innerHTML = '';
      
      if (!buyInventory || !buyInventory[category]) {
        container.innerHTML = '<div class="empty-state">No items available</div>';
        return;
      }

      buyInventory[category].forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div>
            <div class="price-label">Vendor Price</div>
            <div class="price-value">$${formatNumber(item.vendorPrice)}</div>
          </div>
          <div>
            <div class="price-label">Buy Price (50%)</div>
            <div class="price-value">$${formatNumber(item.buyPrice)}</div>
          </div>
          <input type="number" 
                 id="sell-${category}-qty-${index}" 
                 min="0" 
                 value="0" 
                 placeholder="Qty"
                 data-category="${category}"
                 data-index="${index}">
          <button class="btn btn-secondary" onclick="removeSellItem('${category}', ${index})" style="padding: 0.5rem;">X</button>
        `;
        container.appendChild(row);
      });
    }

    function renderBuyItems() {
      const container = document.getElementById('sell-items');
      container.innerHTML = '';
      
      if (!sellInventory || sellInventory.length === 0) {
        container.innerHTML = '<div class="empty-state">No items available for purchase</div>';
        return;
      }

      sellInventory.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'item-row sell-item';
        row.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div>
            <div class="price-label">Price</div>
            <div class="price-value">$${formatNumber(item.price)}</div>
          </div>
          <input type="number" 
                 id="buy-qty-${index}" 
                 min="0" 
                 value="0" 
                 placeholder="Qty"
                 data-index="${index}">
          <button class="btn btn-secondary" onclick="removeBuyItem(${index})" style="padding: 0.5rem;">X</button>
        `;
        container.appendChild(row);
      });
    }

    function removeSellItem(category, index) {
      const input = document.getElementById(`sell-${category}-qty-${index}`);
      input.value = 0;
    }

    function removeBuyItem(index) {
      const input = document.getElementById(`buy-qty-${index}`);
      input.value = 0;
    }

    function formatNumber(num) {
      return num.toLocaleString('en-US');
    }

    function formatCurrency(num) {
      return '$' + formatNumber(num);
    }

    async function submitSellOrder() {
      // Validate required fields
      const ign = document.getElementById('sell-ign').value.trim();
      const server = document.getElementById('sell-server').value;
      const notes = document.getElementById('sell-notes').value.trim();

      if (!ign) {
        showError('Please enter your In-Game Name (IGN).', 'sell-order-result');
        document.getElementById('sell-ign').focus();
        return;
      }

      if (!server) {
        showError('Please select your Server.', 'sell-order-result');
        document.getElementById('sell-server').focus();
        return;
      }

      const orderData = {
        orderType: 'sell',
        weapons: [],
        drugs: [],
        collectibles: [],
        ign: ign,
        server: server,
        notes: notes,
        sellerInfo: `IGN: ${ign} | Server: ${server}${notes ? ' | Notes: ' + notes : ''}`
      };

      let hasItems = false;

      ['weapons'].forEach(category => {
        if (!buyInventory || !buyInventory[category]) return;
        
        buyInventory[category].forEach((item, index) => {
          const input = document.getElementById(`sell-${category}-qty-${index}`);
          if (input && parseInt(input.value) > 0) {
            orderData[category].push({
              name: item.name,
              vendorPrice: item.vendorPrice,
              buyPrice: item.buyPrice,
              quantity: parseInt(input.value)
            });
            hasItems = true;
          }
        });
      });

      if (!hasItems) {
        showError('Please add at least one item to your sell order.', 'sell-order-result');
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(orderData)
        });

        const result = await response.json();
        
        if (result.success) {
          displaySellOrderSummary(result.orderId, result.orderData);
          resetSellForm();
        } else {
          showError('Failed to create order: ' + result.error, 'sell-order-result');
        }
      } catch (error) {
        console.error('Error submitting order:', error);
        showError('Failed to submit order. Please try again.', 'sell-order-result');
      }
    }

    async function submitBuyOrder() {
      // Validate required fields
      const ign = document.getElementById('buy-ign').value.trim();
      const server = document.getElementById('buy-server').value;
      const notes = document.getElementById('buy-notes').value.trim();

      if (!ign) {
        showError('Please enter your In-Game Name (IGN).', 'buy-order-result');
        document.getElementById('buy-ign').focus();
        return;
      }

      if (!server) {
        showError('Please select your Server.', 'buy-order-result');
        document.getElementById('buy-server').focus();
        return;
      }

      const orderData = {
        orderType: 'buy',
        items: [],
        ign: ign,
        server: server,
        notes: notes,
        sellerInfo: `IGN: ${ign} | Server: ${server}${notes ? ' | Notes: ' + notes : ''}`
      };

      let hasItems = false;

      if (sellInventory) {
        sellInventory.forEach((item, index) => {
          const input = document.getElementById(`buy-qty-${index}`);
          if (input && parseInt(input.value) > 0) {
            orderData.items.push({
              name: item.name,
              price: item.price,
              quantity: parseInt(input.value)
            });
            hasItems = true;
          }
        });
      }

      if (!hasItems) {
        showError('Please add at least one item to your buy order.', 'buy-order-result');
        return;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(orderData)
        });

        const result = await response.json();
        
        if (result.success) {
          displayBuyOrderSummary(result.orderId, result.orderData);
          resetBuyForm();
        } else {
          showError('Failed to create order: ' + result.error, 'buy-order-result');
        }
      } catch (error) {
        console.error('Error submitting order:', error);
        showError('Failed to submit order. Please try again.', 'buy-order-result');
      }
    }

    function displaySellOrderSummary(orderId, orderData) {
      let totalVendor = 0;
      let totalBuy = 0;
      let breakdownHtml = '';

      ['weapons', 'drugs', 'collectibles'].forEach(category => {
        if (orderData[category] && orderData[category].length > 0) {
          const categoryTitle = category.charAt(0).toUpperCase() + category.slice(1);
          breakdownHtml += `<div class="breakdown-category">`;
          breakdownHtml += `<div class="breakdown-category-title">${categoryTitle}</div>`;
          
          orderData[category].forEach(item => {
            const itemVendor = item.vendorPrice * item.quantity;
            const itemBuy = item.buyPrice * item.quantity;
            totalVendor += itemVendor;
            totalBuy += itemBuy;
            
            breakdownHtml += `
              <div class="breakdown-item">
                <span>${item.quantity}x ${item.name}</span>
                <span>V: ${formatCurrency(itemVendor)} | B: ${formatCurrency(itemBuy)}</span>
              </div>
            `;
          });
          
          breakdownHtml += `</div>`;
        }
      });

      // Create copyable Discord message
      const discordMessage = `Sell Order #${orderId}\nIGN: ${orderData.ign}\nServer: ${orderData.server}`;

      const html = `
        <div class="order-summary">
          <div class="section-title">Sell Order Created Successfully</div>
          <div class="order-id">${orderId}</div>
          
          <div style="background: var(--bg-secondary); border: 1px solid var(--accent-green); padding: 1rem; margin: 1rem 0; border-radius: 4px;">
            <div style="font-family: 'Courier Prime', monospace; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
              Copy and paste this into Discord:
            </div>
            <div style="background: var(--bg-primary); padding: 1rem; border-radius: 4px; font-family: 'Courier Prime', monospace; color: var(--accent-green); margin-bottom: 0.5rem; white-space: pre-wrap;" id="discord-copy-text-sell">${discordMessage}</div>
            <button class="btn btn-secondary" onclick="copyToClipboard('discord-copy-text-sell')" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Copy to Clipboard</button>
          </div>

          <div class="order-breakdown">
            ${breakdownHtml}
            <div class="breakdown-totals">
              <div class="breakdown-total total-vendor">
                <span>Total Vendor Value:</span>
                <span>${formatCurrency(totalVendor)}</span>
              </div>
              <div class="breakdown-total total-buy">
                <span>Total Buy Value (50%):</span>
                <span>${formatCurrency(totalBuy)}</span>
              </div>
            </div>
          </div>
          ${orderData.notes ? `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-family: 'Courier Prime', monospace; color: var(--text-secondary);">Notes: ${orderData.notes}</div>` : ''}
        </div>
      `;

      document.getElementById('sell-order-result').innerHTML = html;
      document.getElementById('sell-order-result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function displayBuyOrderSummary(orderId, orderData) {
      let totalBuy = 0;
      let breakdownHtml = '<div class="breakdown-category"><div class="breakdown-category-title">Items</div>';

      if (orderData.items) {
        orderData.items.forEach(item => {
          const itemTotal = item.price * item.quantity;
          totalBuy += itemTotal;
          
          breakdownHtml += `
            <div class="breakdown-item">
              <span>${item.quantity}x ${item.name}</span>
              <span>${formatCurrency(itemTotal)}</span>
            </div>
          `;
        });
      }

      breakdownHtml += '</div>';

      // Create copyable Discord message
      const discordMessage = `Buy Order #${orderId}\nIGN: ${orderData.ign}\nServer: ${orderData.server}`;

      const html = `
        <div class="order-summary">
          <div class="section-title">Buy Order Created Successfully</div>
          <div class="order-id">${orderId}</div>
          
          <div style="background: var(--bg-secondary); border: 1px solid var(--accent-green); padding: 1rem; margin: 1rem 0; border-radius: 4px;">
            <div style="font-family: 'Courier Prime', monospace; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
              Copy and paste this into Discord:
            </div>
            <div style="background: var(--bg-primary); padding: 1rem; border-radius: 4px; font-family: 'Courier Prime', monospace; color: var(--accent-green); margin-bottom: 0.5rem; white-space: pre-wrap;" id="discord-copy-text">${discordMessage}</div>
            <button class="btn btn-secondary" onclick="copyToClipboard('discord-copy-text')" style="padding: 0.5rem 1rem; font-size: 0.9rem;">Copy to Clipboard</button>
          </div>

          <div class="order-breakdown">
            ${breakdownHtml}
            <div class="breakdown-totals">
              <div class="breakdown-total total-buy">
                <span>Total:</span>
                <span>${formatCurrency(totalBuy)}</span>
              </div>
            </div>
          </div>
          ${orderData.notes ? `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-family: 'Courier Prime', monospace; color: var(--text-secondary);">Notes: ${orderData.notes}</div>` : ''}
        </div>
      `;

      document.getElementById('buy-order-result').innerHTML = html;
      document.getElementById('buy-order-result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyToClipboard(elementId) {
      const text = document.getElementById(elementId).textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard! Now paste this into Discord.');
      }).catch(err => {
        console.error('Failed to copy:', err);
        alert('Failed to copy. Please manually copy the text above.');
      });
    }

    async function lookupOrder() {
      const orderId = document.getElementById('lookup-order-id').value.trim();
      
      if (!orderId) {
        showError('Please enter an order ID.', 'lookup-result');
        return;
      }

      const resultDiv = document.getElementById('lookup-result');
      resultDiv.innerHTML = '<div class="loading">Looking up order...</div>';

      try {
        const response = await fetch(`${API_URL}?action=getOrder&orderId=${orderId}`);
        const result = await response.json();
        
        if (result.error) {
          showError(result.error, 'lookup-result');
          return;
        }

        displayLookupResult(result);
      } catch (error) {
        console.error('Error looking up order:', error);
        showError('Failed to lookup order. Please try again.', 'lookup-result');
      }
    }

    function displayLookupResult(result) {
      const orderType = result.orderType || 'sell'; // Default to sell for backwards compat
      let breakdownHtml = '';
      let totalsHtml = '';

      if (orderType === 'sell') {
        // Sell order = player selling TO you (weapons/drugs/collectibles with vendor/buy prices)
        let totalVendor = 0;
        let totalBuy = 0;

        ['weapons', 'drugs', 'collectibles'].forEach(category => {
          if (result.orderData[category] && result.orderData[category].length > 0) {
            const categoryTitle = category.charAt(0).toUpperCase() + category.slice(1);
            breakdownHtml += `<div class="breakdown-category">`;
            breakdownHtml += `<div class="breakdown-category-title">${categoryTitle}</div>`;
            
            result.orderData[category].forEach(item => {
              const itemVendor = item.vendorPrice * item.quantity;
              const itemBuy = item.buyPrice * item.quantity;
              totalVendor += itemVendor;
              totalBuy += itemBuy;
              
              breakdownHtml += `
                <div class="breakdown-item">
                  <span>${item.quantity}x ${item.name}</span>
                  <span>V: ${formatCurrency(itemVendor)} | B: ${formatCurrency(itemBuy)}</span>
                </div>
              `;
            });
            
            breakdownHtml += `</div>`;
          }
        });

        totalsHtml = `
          <div class="breakdown-total total-vendor">
            <span>Total Vendor Value:</span>
            <span>${formatCurrency(totalVendor)}</span>
          </div>
          <div class="breakdown-total total-buy">
            <span>Total Buy Value (50%):</span>
            <span>${formatCurrency(totalBuy)}</span>
          </div>
        `;
      } else if (orderType === 'buy') {
        // Buy order = player buying FROM you (AS50/PKP + TF items, simple price)
        let totalBuy = 0;
        breakdownHtml = '<div class="breakdown-category"><div class="breakdown-category-title">Items</div>';

        if (result.orderData.items) {
          result.orderData.items.forEach(item => {
            const itemTotal = item.price * item.quantity;
            totalBuy += itemTotal;
            
            breakdownHtml += `
              <div class="breakdown-item">
                <span>${item.quantity}x ${item.name}</span>
                <span>${formatCurrency(itemTotal)}</span>
              </div>
            `;
          });
        }

        breakdownHtml += '</div>';

        totalsHtml = `
          <div class="breakdown-total total-buy">
            <span>Total:</span>
            <span>${formatCurrency(totalBuy)}</span>
          </div>
        `;
      }

      const timestamp = new Date(result.timestamp).toLocaleString();
      const orderTypeLabel = orderType === 'buy' ? 'Buy Order' : 'Sell Order';

      const html = `
        <div class="order-summary">
          <div class="section-title">${orderTypeLabel} Details</div>
          <div class="order-id">${result.orderId}</div>
          <div style="text-align: center; color: var(--text-secondary); font-family: 'Courier Prime', monospace; margin-bottom: 1rem; font-size: 0.9rem;">
            Created: ${timestamp}
          </div>
          <div class="order-breakdown">
            ${breakdownHtml}
            <div class="breakdown-totals">
              ${totalsHtml}
            </div>
          </div>
          ${result.sellerInfo ? `<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-family: 'Courier Prime', monospace; color: var(--text-secondary);">${orderType === 'sell' ? 'Seller' : 'Buyer'}: ${result.sellerInfo}</div>` : ''}
        </div>
      `;

      document.getElementById('lookup-result').innerHTML = html;
    }

    function resetSellForm() {
      document.querySelectorAll('[id^="sell-"][id$="-qty-"]').forEach(input => {
        if (input.type === 'number') input.value = 0;
      });
      document.getElementById('sell-ign').value = '';
      document.getElementById('sell-server').value = '';
      document.getElementById('sell-notes').value = '';
      
      const checkbox = document.getElementById('weapons-check');
      const wrapper = document.getElementById('weapons-toggle');
      const section = document.getElementById('weapons-section');
      
      checkbox.checked = false;
      wrapper.classList.remove('active');
      section.style.display = 'none';
    }

    function resetBuyForm() {
      document.querySelectorAll('[id^="buy-qty-"]').forEach(input => {
        input.value = 0;
      });
      document.getElementById('buy-ign').value = '';
      document.getElementById('buy-server').value = '';
      document.getElementById('buy-notes').value = '';
    }

    function showError(message, targetId) {
      const html = `<div class="error">${message}</div>`;
      document.getElementById(targetId).innerHTML = html;
    }

    // Initialize on load
    loadInventories();
  </script>
</body>
